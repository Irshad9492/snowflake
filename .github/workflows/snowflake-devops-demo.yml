name: snowflake-devops-demo
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
jobs:
  deploy-snowflake-changes-job:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
 
      - name: Use Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
 
      - name: Run schemachange
        env:
          SF_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_ROLE: ${{ secrets.SF_ROLE }}
          SF_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
          SF_DATABASE: ${{ secrets.SF_DATABASE }}
 
        run: |
          pip install schemachange
 
          mkdir -p ~/.snowflake
 
          echo "[default]" > ~/.snowflake/connections.toml
          echo "account = \"$SF_ACCOUNT\"" >> ~/.snowflake/connections.toml
          echo "user = \"$SF_USERNAME\"" >> ~/.snowflake/connections.toml
          echo "password = \"$SF_PASSWORD\"" >> ~/.snowflake/connections.toml
          echo "role = \"$SF_ROLE\"" >> ~/.snowflake/connections.toml
          echo "warehouse = \"$SF_WAREHOUSE\"" >> ~/.snowflake/connections.toml
          echo "database = \"$SF_DATABASE\"" >> ~/.snowflake/connections.toml
 
          schemachange deploy --root-folder $GITHUB_WORKSPACE/migrations --connections-file-path ~/.snowflake/connections.toml --connection-name default
